<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
            margin-top: 80px;
        }
        .brand-icon {
            font-size: 4rem;
            color: #667eea;
        }
        .btn-lg {
            font-size: 1.3rem;
            padding: 16px 32px;
            border-radius: 12px;
        }
        .footer {
            text-align: center;
            color: #fff;
            margin-top: 60px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card text-center p-5">
        <div class="mb-4">
            <i class="bi bi-car-front brand-icon"></i>
        </div>
        <h1 class="mb-3 fw-bold">Benvenuto in SmartParking</h1>
        <p class="lead text-muted mb-4">
            Gestione intelligente del parcheggio.<br>
            Accedi per monitorare, analizzare e gestire il sistema.
        </p>
        <a href="/login" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Accedi
        </a>
    </div>
    <div class="footer">
        <small>
            <i class="bi bi-c-circle"></i> 2024 SmartParking &mdash; Tutti i diritti riservati
        </small>
    </div>
</div>
</body>
</html>
