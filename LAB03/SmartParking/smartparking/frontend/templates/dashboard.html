<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-3px);
        }
        .dashboard-btn {
            width: 100%;
            padding: 30px 0;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 16px rgba(102,126,234,0.15);
            transition: all 0.2s;
        }
        .dashboard-btn i {
            font-size: 2.2rem;
            margin-right: 12px;
            vertical-align: middle;
        }
        .dashboard-btn.park {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
        }
        .dashboard-btn.park:hover {
            background: linear-gradient(135deg, #218838 0%, #28a745 100%);
            transform: scale(1.03);
        }
        .dashboard-btn.analytics {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            border: none;
        }
        .dashboard-btn.analytics:hover {
            background: linear-gradient(135deg, #138496 0%, #17a2b8 100%);
            transform: scale(1.03);
        }
        .logout-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            padding: 10px 18px;
            font-size: 1rem;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(220,53,69,0.15);
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, #c82333 0%, #dc3545 100%);
        }
        @media (max-width: 600px) {
            .dashboard-btn {
                font-size: 1.1rem;
                padding: 18px 0;
            }
            .logout-btn {
                top: 15px;
                right: 15px;
                font-size: 0.9rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<button class="logout-btn" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i> Logout
</button>
<div class="container mt-5">
    <div class="card p-4 text-center">
        <h1 class="mb-4">
            <i class="bi bi-speedometer2 text-primary"></i>
            SmartParking Dashboard
        </h1>
        <p class="text-muted mb-5">Benvenuto! Scegli una sezione per gestire il parcheggio o visualizzare le analytics.</p>
        <div class="row g-4 justify-content-center">
            <div class="col-12 col-md-4">
                <button class="dashboard-btn park" onclick="goToParkManagement()">
                    <i class="bi bi-car-front-fill"></i>
                    ParkManagement
                </button>
            </div>
            <div class="col-12 col-md-4">
                <button class="dashboard-btn analytics" onclick="goToAnalytics()">
                    <i class="bi bi-graph-up-arrow"></i>
                    Analytics
                </button>
            </div>
            <div class="col-12 col-md-4">
                <button class="dashboard-btn tickets" style="background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); color: white;" onclick="goToTicketsViewer()">
                    <i class="bi bi-ticket-perforated"></i>
                    Tickets Viewer
                </button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function goToParkManagement() {
        window.location.href = '/parkmanagement';
    }
    function goToAnalytics() {
        window.location.href = '/analytics';
    }
    function goToTicketsViewer() {
        window.location.href = '/ticketsviewer';
    }

    async function logout() {
        try {
            const response = await fetch('/api/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'ADMIN' })
            });
            if (response.ok) {
                window.location.href = '/';
            } else {
                const error = await response.json();
                alert('Errore durante il logout');
            }
        } catch (err) {
            alert('Errore di connessione');
        }
    }
</script>
</body>
</html>
