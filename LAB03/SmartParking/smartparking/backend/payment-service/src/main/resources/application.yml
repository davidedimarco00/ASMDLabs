server:
  port: ${PAYMENT_SERVICE_INSTANCE_PORT:8083}

spring:
  application:
    name: payment-service
  data:
    mongodb:
      uri: ${PAYMENT_MONGODB_URI:mongodb://mongodb:27017/paymentservicedb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${PAYMENT_SERVICE_INSTANCE_HOSTNAME:payment-service}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

management:
  server:
    port: 8083
    servlet:
      context-path: /
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.smartparking: DEBUG
    org.springframework: INFO
